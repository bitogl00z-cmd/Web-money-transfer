version: "3.8"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: money_transfer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  compreface:
    image: exadel/compreface:latest
    ports:
      - "8000:8000"
    environment:
      ADMIN_PASSWORD: admin
    volumes:
      - compreface_data:/face-recognition

volumes:
  mysql_data:
  compreface_data:
