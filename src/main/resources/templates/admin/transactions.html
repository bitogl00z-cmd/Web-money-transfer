<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/layout :: head('Quản trị')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('admin')"></nav>
    <aside th:replace="fragments/layout :: sidebar('admin')"></aside>
    <main class="main-content">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <h1 class="page-title">Tất cả giao dịch</h1>
                <p class="page-subtitle">Xem tất cả giao dịch trong hệ thống</p>
            </div>
            <span class="badge badge-info" style="font-size:1rem;padding:8px 16px;" id="txCount">Đang tải...</span>
        </div>
        <div class="card">
            <div class="table-container">
                <table class="table"><thead><tr><th>Mã GD</th><th>Từ tài khoản</th><th>Đến tài khoản</th><th>Số tiền</th><th>Loại</th><th>Trạng thái</th><th>Ngày</th></tr></thead><tbody id="txBody"></tbody></table>
            </div>
            <div id="loadingState" style="text-align:center;padding:40px;color:var(--text-muted);">Đang tải...</div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        fetch('/api/admin/transactions?page=0&size=100', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
            document.getElementById('loadingState').style.display = 'none';
            var body = document.getElementById('txBody');
            var txs = data.content || data;
            document.getElementById('txCount').textContent = txs.length + ' giao dịch';
            if (txs.length) {
                txs.forEach(function(tx) {
                    var row = body.insertRow();
                    var typeBadge = tx.type === 'TRANSFER' ? '<span class="badge badge-info">↔ Chuyển</span>' : tx.type === 'DEPOSIT' ? '<span class="badge badge-success">↓ Nạp</span>' : '<span class="badge badge-warning">↑ Rút</span>';
                    var statusBadge = tx.status === 'COMPLETED' ? '<span class="badge badge-success">HOÀN TẤT</span>' : '<span class="badge badge-warning">CHỜ</span>';
                    row.innerHTML = '<td style="font-family:monospace;font-size:0.85rem;">' + tx.transactionCode + '</td><td style="font-size:0.85rem;">' + (tx.fromAccountNumber || '-') + '</td><td style="font-size:0.85rem;">' + (tx.toAccountNumber || '-') + '</td><td style="font-weight:600;">' + formatVND(tx.amount) + '</td><td>' + typeBadge + '</td><td>' + statusBadge + '</td><td style="font-size:0.85rem;color:var(--text-muted);">' + formatDateShort(tx.createdAt) + '</td>';
                });
            } else { body.innerHTML = '<tr><td colspan="7" class="empty">Không có giao dịch</td></tr>'; }
        }).catch(function() { document.getElementById('loadingState').textContent = 'Không thể tải dữ liệu.'; });
    </script>
</body>
</html>
