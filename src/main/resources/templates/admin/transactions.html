<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Admin Transactions - Money Transfer</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100">
<nav class="bg-blue-600 text-white p-4 shadow-lg"><div class="container mx-auto flex justify-between"><span class="text-xl font-bold">MoneyTransfer</span><div class="space-x-4">
<a href="/dashboard" class="hover:underline">Dashboard</a><a href="/admin/users" class="hover:underline">Users</a><a href="/admin/transactions" class="underline font-bold">Transactions</a><a href="/logout" class="hover:underline">Logout</a>
</div></div></nav>
<div class="container mx-auto p-4"><h1 class="text-2xl font-bold mb-4">Admin - All Transactions</h1>
<div class="bg-white p-6 rounded-lg shadow"><table class="w-full"><thead><tr class="border-b"><th class="text-left p-2">Code</th><th class="text-left p-2">From</th><th class="text-left p-2">To</th><th class="text-left p-2">Amount</th><th class="text-left p-2">Type</th><th class="text-left p-2">Status</th><th class="text-left p-2">Date</th></tr></thead><tbody id="txBody"></tbody></table></div>
</div>
<script>
fetch('/api/admin/transactions?page=0&size=100',{credentials:'include'}).then(r=>r.json()).then(data=>{const body=document.getElementById('txBody');(data.content||data).forEach(tx=>{const row=body.insertRow();row.innerHTML='<td class="p-2">'+tx.transactionCode+'</td><td class="p-2">'+(tx.fromAccountNumber||'')+'</td><td class="p-2">'+(tx.toAccountNumber||'')+'</td><td class="p-2">$'+tx.amount+'</td><td class="p-2">'+tx.type+'</td><td class="p-2">'+tx.status+'</td><td class="p-2">'+new Date(tx.createdAt).toLocaleDateString()+'</td>';});});
</script>
</body>
</html>
