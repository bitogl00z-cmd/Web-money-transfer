<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Users - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-xl font-bold">💰 MoneyTransfer Admin</span>
            <div class="space-x-6">
                <a href="/dashboard" class="hover:text-blue-300 transition">Dashboard</a>
                <a href="/admin/users" class="text-blue-400 font-bold border-b-2 border-blue-400">Users</a>
                <a href="/admin/transactions" class="hover:text-blue-300 transition">Transactions</a>
                <a href="/logout" class="text-red-300 hover:text-red-200 transition">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">👥 User Management</h1>
            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium" id="userCount">0 users</span>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">ID</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Username</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Name</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Email</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Role</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Status</th>
                        <th class="text-left p-4 text-gray-600 font-medium text-sm">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
            <div id="loadingState" class="text-center p-8 text-gray-400">Loading users...</div>
        </div>
    </div>

    <script>
        fetch('/api/admin/users', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loadingState').classList.add('hidden');
                const body = document.getElementById('usersBody');
                const users = data.content || [];
                document.getElementById('userCount').textContent = users.length + ' users';
                users.forEach(u => {
                    const row = body.insertRow();
                    row.className = 'border-b hover:bg-gray-50 transition';
                    const roleBadge = u.role === 'ADMIN'
                        ? '<span class="bg-purple-100 text-purple-800 px-2 py-0.5 rounded text-xs font-medium">ADMIN</span>'
                        : '<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-medium">USER</span>';
                    const statusBadge = u.status === 'LOCKED'
                        ? '<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs font-medium">LOCKED</span>'
                        : '<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-medium">ACTIVE</span>';
                    const actionBtn = u.status !== 'LOCKED'
                        ? '<button onclick="lockUser(' + u.id + ')" class="text-red-600 hover:text-red-800 text-sm font-medium">Lock</button>'
                        : '<button onclick="unlockUser(' + u.id + ')" class="text-green-600 hover:text-green-800 text-sm font-medium">Unlock</button>';
                    row.innerHTML = '<td class="p-4 text-gray-500 text-sm">' + u.id + '</td>'
                        + '<td class="p-4 font-medium">' + u.username + '</td>'
                        + '<td class="p-4 text-gray-700">' + u.fullName + '</td>'
                        + '<td class="p-4 text-gray-500 text-sm">' + u.email + '</td>'
                        + '<td class="p-4">' + roleBadge + '</td>'
                        + '<td class="p-4">' + statusBadge + '</td>'
                        + '<td class="p-4">' + actionBtn + '</td>';
                });
                if (users.length === 0) {
                    body.innerHTML = '<tr><td colspan="7" class="text-center p-8 text-gray-400">No users found</td></tr>';
                }
            })
            .catch(() => {
                document.getElementById('loadingState').textContent = 'Failed to load users.';
            });

        function lockUser(id) {
            if (confirm('Lock this user?')) {
                fetch('/api/admin/users/' + id + '/lock', { method: 'POST', credentials: 'include' })
                    .then(r => r.ok ? location.reload() : alert('Failed'));
            }
        }

        function unlockUser(id) {
            if (confirm('Unlock this user?')) {
                fetch('/api/admin/users/' + id + '/unlock', { method: 'POST', credentials: 'include' })
                    .then(r => r.ok ? location.reload() : alert('Failed'));
            }
        }
    </script>
</body>
</html>
