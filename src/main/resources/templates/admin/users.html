<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/layout :: head('Quản trị')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('admin')"></nav>
    <aside th:replace="fragments/layout :: sidebar('admin')"></aside>
    <main class="main-content">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <h1 class="page-title">👥 Quản lý người dùng</h1>
                <p class="page-subtitle">Xem và quản lý tất cả người dùng hệ thống</p>
            </div>
            <span class="badge badge-info" style="font-size:1rem;padding:8px 16px;" id="userCount">0 người dùng</span>
        </div>
        <div class="card">
            <div class="table-container">
                <table class="table"><thead><tr><th>ID</th><th>Username</th><th>Họ tên</th><th>Email</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody id="usersBody"></tbody></table>
            </div>
            <div id="loadingState" style="text-align:center;padding:40px;color:var(--text-muted);">Đang tải...</div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        fetch('/api/admin/users', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
            document.getElementById('loadingState').style.display = 'none';
            var body = document.getElementById('usersBody');
            var users = data.content || [];
            document.getElementById('userCount').textContent = users.length + ' người dùng';
            if (users.length) {
                users.forEach(function(u) {
                    var row = body.insertRow();
                    var roleBadge = u.role === 'ADMIN' ? '<span class="badge badge-purple">ADMIN</span>' : '<span class="badge badge-gray">USER</span>';
                    var statusBadge = u.status === 'LOCKED' ? '<span class="badge badge-danger">KHÓA</span>' : '<span class="badge badge-success">HOẠT ĐỘNG</span>';
                    var actionBtn = u.status !== 'LOCKED' ? '<button onclick="lockUser(' + u.id + ')" class="btn btn-danger btn-sm">Khóa</button>' : '<button onclick="unlockUser(' + u.id + ')" class="btn btn-success btn-sm">Mở khóa</button>';
                    row.innerHTML = '<td style="color:var(--text-muted);font-size:0.85rem;">' + u.id + '</td><td style="font-weight:600;">' + u.username + '</td><td>' + u.fullName + '</td><td style="color:var(--text-muted);">' + u.email + '</td><td>' + roleBadge + '</td><td>' + statusBadge + '</td><td>' + actionBtn + '</td>';
                });
            } else { body.innerHTML = '<tr><td colspan="7" class="empty">Không có người dùng</td></tr>'; }
        }).catch(function() { document.getElementById('loadingState').textContent = 'Không thể tải dữ liệu.'; });
        function lockUser(id) { if (confirm('Khóa người dùng này?')) { fetch('/api/admin/users/' + id + '/lock', { method: 'POST', credentials: 'include' }).then(function(r) { if (r.ok) location.reload(); }); } }
        function unlockUser(id) { if (confirm('Mở khóa người dùng này?')) { fetch('/api/admin/users/' + id + '/unlock', { method: 'POST', credentials: 'include' }).then(function(r) { if (r.ok) location.reload(); }); } }
    </script>
</body>
</html>
