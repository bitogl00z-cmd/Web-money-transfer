<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between">
            <span class="text-xl font-bold">MoneyTransfer</span>
            <div class="space-x-4">
                <a href="/dashboard" class="font-bold underline">Dashboard</a>
                <a href="/transfer" class="hover:underline">Transfer</a>
                <a href="/history" class="hover:underline">History</a>
                <a href="/beneficiaries" class="hover:underline">Beneficiaries</a>
                <a href="/scheduled" class="hover:underline">Scheduled</a>
                <a href="/profile" class="hover:underline">Profile</a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin/users" class="hover:underline">Admin</a>
                <a href="/logout" class="hover:underline">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Total Balance</h3>
                <p class="text-3xl font-bold text-green-600" id="totalBalance">Loading...</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Accounts</h3>
                <p class="text-3xl font-bold text-blue-600" id="accountCount">Loading...</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm">Recent Activity</h3>
                <p class="text-3xl font-bold text-orange-600" id="recentCount">Loading...</p>
            </div>
        </div>
        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="text-xl font-bold mb-4">7-Day Balance Chart</h2>
            <canvas id="balanceChart"></canvas>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Recent Transactions</h2>
            <table class="w-full" id="recentTxTable">
                <thead><tr class="border-b"><th class="text-left p-2">Code</th><th class="text-left p-2">Amount</th><th class="text-left p-2">Type</th><th class="text-left p-2">Date</th></tr></thead>
                <tbody id="txBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        fetch('/api/dashboard/stats', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                document.getElementById('totalBalance').textContent = '$' + data.totalBalance;
                document.getElementById('accountCount').textContent = data.accountCount;
                document.getElementById('recentCount').textContent = data.recentTransactions?.length || 0;
                const txBody = document.getElementById('txBody');
                data.recentTransactions?.forEach(tx => {
                    const row = txBody.insertRow();
                    row.innerHTML = '<td class="p-2">' + tx.transactionCode + '</td><td class="p-2">$' + tx.amount + '</td><td class="p-2">' + tx.type + '</td><td class="p-2">' + new Date(tx.createdAt).toLocaleDateString() + '</td>';
                });
                if (data.chartData) {
                    new Chart(document.getElementById('balanceChart'), {
                        type: 'line',
                        data: {
                            labels: data.chartData.map(d => d.date),
                            datasets: [{ label: 'Net Balance', data: data.chartData.map(d => d.net), borderColor: '#2563eb' }]
                        }
                    });
                }
            });
    </script>
</body>
</html>
