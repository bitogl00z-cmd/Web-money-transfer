<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/layout :: head('Tổng quan')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('dashboard')"></nav>
    <aside th:replace="fragments/layout :: sidebar('dashboard')"></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="dashboard-greeting">
                <div class="dash-avatar" id="dashAvatar">
                    <div class="dash-avatar-placeholder" id="dashAvatarPlaceholder">U</div>
                    <img id="dashAvatarImg" src="" alt="" style="display:none;" class="dash-avatar-img">
                </div>
                <div>
                    <div class="dashboard-greeting-text" id="dashGreeting"></div>
                    <div class="page-subtitle" id="dashGreetingSub">Xem tổng quan số dư và giao dịch gần đây</div>
                </div>
            </div>
        </div>
        <div class="stat-grid" id="statsContainer">
            <div class="stat-card blue">
                <div class="stat-label">Tổng số dư</div>
                <div class="stat-value" id="totalBalance">—</div>
                <div class="stat-sub">Tất cả tài khoản</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-label">Giao dịch gần đây</div>
                <div class="stat-value" id="recentCount">—</div>
                <div class="stat-sub">Trong 7 ngày qua</div>
            </div>
        </div>

        <div class="card" style="margin-bottom:24px;">
            <div class="card-header"><div class="card-title">💳 Tài khoản của bạn</div></div>
            <div class="table-container">
                <table class="table"><thead><tr><th>STK</th><th>Số dư</th><th>Trạng thái</th></tr></thead><tbody id="accountsBody"></tbody></table>
            </div>
        </div>
        <div class="card" style="margin-bottom:24px;">
            <div class="card-header">
                <div>
                    <div class="card-title">Thu / Chi 7 ngày qua</div>
                    <div class="card-subtitle">Cột xanh: tiền về | Cột đỏ: tiền đi</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="balanceChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">Giao dịch gần đây</div>
                    <div class="card-subtitle">Các giao dịch mới nhất</div>
                </div>
                <a href="/history" class="btn btn-outline btn-sm">Xem tất cả</a>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Mã GD</th><th>Số tiền</th><th>Loại</th><th>Ngày</th></tr></thead>
                    <tbody id="txBody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        // Force PIN if not set
        apiFetch('/api/users/profile').then(function(res) {
            if (res.ok && !res.data.pinSet) {
                openModal('<div class="modal-title">⚠️ Cần cài đặt mã PIN</div>' +
                    '<div class="modal-desc">Mã PIN giao dịch là bắt buộc để đảm bảo an toàn. Vui lòng cài đặt mã PIN trước khi sử dụng.</div>' +
                    '<div style="margin:16px 0;">' +
                    '<div class="form-group"><label class="form-label">Mã PIN (4-6 số)</label><input type="password" id="forcePinInput" class="form-input" placeholder="••••••" maxlength="6" inputmode="numeric" style="max-width:200px;"></div>' +
                    '<div class="form-group"><label class="form-label">Xác nhận mã PIN</label><input type="password" id="forcePinConfirm" class="form-input" placeholder="••••••" maxlength="6" inputmode="numeric" style="max-width:200px;"></div>' +
                    '</div>' +
                    '<div class="modal-actions">' +
                    '<button onclick="saveForcePin()" class="btn btn-primary btn-lg btn-full">Cài đặt PIN</button>' +
                    '</div>');
            }
            var u = res.data;
            if (u) {
                var greeting = document.getElementById('dashGreeting');
                greeting.textContent = 'Xin chào, ' + (u.fullName || u.username || '') + '!';
                var dashAvatarImg = document.getElementById('dashAvatarImg');
                var dashAvatarPlaceholder = document.getElementById('dashAvatarPlaceholder');
                if (u.avatarUrl && u.avatarUrl.trim() !== '') {
                    dashAvatarImg.src = u.avatarUrl;
                    dashAvatarImg.style.display = '';
                    dashAvatarPlaceholder.style.display = 'none';
                } else {
                    dashAvatarImg.style.display = 'none';
                    dashAvatarPlaceholder.style.display = '';
                    var name = u.fullName || u.username || 'U';
                    dashAvatarPlaceholder.textContent = name.charAt(0).toUpperCase();
                }
            }
        });

        function saveForcePin() {
            var pin = document.getElementById('forcePinInput').value;
            var confirm = document.getElementById('forcePinConfirm').value;
            if (!pin || !pin.match(/^\d{4,6}$/)) { showToast('Mã PIN phải là 4-6 chữ số', 'error'); return; }
            if (pin !== confirm) { showToast('Mã PIN không khớp', 'error'); return; }
            apiFetch('/api/pin/set', { method: 'POST', body: { pin: pin, oldPin: '' } }).then(function(res) {
                if (res.ok) { closeModal(); showToast('Cài đặt mã PIN thành công!', 'success'); }
                else { showToast(res.data.error || 'Lỗi', 'error'); }
            });
        }

        fetch('/api/dashboard/stats', { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('totalBalance').textContent = formatVND(data.totalBalance);
                document.getElementById('recentCount').textContent = (data.recentTransactions && data.recentTransactions.length) || 0;
                var abody = document.getElementById('accountsBody');
                if (data.accounts && data.accounts.length) {
                    data.accounts.forEach(function(a) {
                        var row = abody.insertRow();
                        var st = a.status === 'ACTIVE' ? '<span class="badge badge-success">Hoạt động</span>' : '<span class="badge badge-danger">' + escapeHtml(a.status) + '</span>';
                        row.innerHTML = '<td style="font-family:monospace;font-weight:600;font-size:1rem;">' + escapeHtml(a.accountNumber) + '</td><td style="font-weight:600;">' + formatVND(a.balance) + '</td><td>' + st + '</td>';
                    });
                } else { abody.innerHTML = '<tr><td colspan="3" class="empty">Chưa có tài khoản</td></tr>'; }
                var txBody = document.getElementById('txBody');
                if (data.recentTransactions && data.recentTransactions.length) {
                    data.recentTransactions.forEach(function(tx) {
                        var row = txBody.insertRow();
                        row.innerHTML = '<td style="font-family:monospace;font-size:0.85rem;">' + escapeHtml(tx.transactionCode) + '</td><td style="font-weight:600;">' + formatVND(tx.amount) + '</td><td><span class="badge badge-info">' + escapeHtml(tx.type) + '</span></td><td>' + escapeHtml(formatDateShort(tx.createdAt)) + '</td>';
                    });
                } else {
                    txBody.innerHTML = '<tr><td colspan="4" class="empty">Chưa có giao dịch nào</td></tr>';
                }
                if (data.chartData) {
                    var ctx = document.getElementById('balanceChart');
                    var labels = data.chartData.map(function(d) { return d.date; });
                    var incomes = data.chartData.map(function(d) { return d.income; });
                    var expenses = data.chartData.map(function(d) { return d.expense; });
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Tiền về', data: incomes, backgroundColor: '#22c55e', borderRadius: 4 },
                                { label: 'Tiền đi', data: expenses, backgroundColor: '#ef4444', borderRadius: 4 }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 16 } }
                            },
                            scales: {
                                y: { beginAtZero: true, ticks: { callback: function(v) { return formatVND(v); } } }
                            }
                        }
                    });
                }
            })
            .catch(function() { showToast('Không thể tải dữ liệu', 'error'); });
    </script>
</body>
</html>
