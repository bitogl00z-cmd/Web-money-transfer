<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">💰</div>
            <h1 class="text-2xl font-bold text-gray-800">Money Transfer</h1>
            <p class="text-gray-500 text-sm">Sign in to your account</p>
        </div>
        <div id="errorMsg" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 hidden"></div>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Username</label>
                <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-medium hover:bg-blue-700 transition">Sign In</button>
        </form>
        <p class="mt-6 text-center text-gray-500 text-sm">
            Don't have an account? <a href="/register" class="text-blue-600 hover:underline font-medium">Register</a>
        </p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            err.classList.add('hidden');
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    }),
                    credentials: 'same-origin'
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    err.textContent = data.error || 'Login failed';
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.textContent = 'Network error. Please try again.';
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
