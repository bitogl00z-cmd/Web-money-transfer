<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Lịch sử')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('history')"></nav>
    <aside th:replace="fragments/layout :: sidebar('history')"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">📋 Lịch sử giao dịch</h1>
            <p class="page-subtitle">Xem tất cả giao dịch đã thực hiện</p>
        </div>
        <div class="card">
            <div class="table-container">
                <table class="table">
                    <thead><tr><th>Mã GD</th><th>Số tiền</th><th>Loại</th><th>Nội dung</th><th>Ngày</th></tr></thead>
                    <tbody id="txBody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        fetch('/api/transactions/history?page=0&size=50', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
            var body = document.getElementById('txBody');
            if (data.content && data.content.length) {
                data.content.forEach(function(tx) {
                    var row = body.insertRow();
                    row.innerHTML = '<td style="font-family:monospace;font-size:0.85rem;">' + tx.transactionCode + '</td><td style="font-weight:600;">' + formatVND(tx.amount) + '</td><td><span class="badge badge-info">' + tx.type + '</span></td><td>' + (tx.description || '') + '</td><td>' + formatDate(tx.createdAt) + '</td>';
                });
            } else { body.innerHTML = '<tr><td colspan="5" class="empty">Chưa có giao dịch nào</td></tr>'; }
        }).catch(function() { showToast('Không thể tải lịch sử', 'error'); });
    </script>
</body>
</html>
