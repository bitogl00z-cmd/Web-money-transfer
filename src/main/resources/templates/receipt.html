<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Kết quả giao dịch')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('receipt')"></nav>
    <aside th:replace="fragments/layout :: sidebar('receipt')"></aside>
    <main class="main-content" style="display:flex;justify-content:center;">
        <div class="card" style="max-width:480px;width:100%;text-align:center;margin-top:20px;">
            <div style="font-size:3.5rem;margin-bottom:12px;animation:pulse 0.6s;">✅</div>
            <h2 style="color:#10b981;font-size:1.5rem;margin-bottom:4px;">Giao dịch thành công</h2>
            <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:24px;">Tiền đã được chuyển đến tài khoản đích</p>

            <div id="receiptContent" style="background:var(--bg);border-radius:var(--radius-sm);padding:20px;text-align:left;">
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Mã giao dịch</span>
                    <span id="r-txCode" style="font-family:monospace;font-weight:600;color:var(--text);font-size:0.9rem;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Từ tài khoản</span>
                    <span id="r-from" style="font-family:monospace;font-weight:600;color:var(--text);font-size:0.9rem;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Đến tài khoản</span>
                    <span id="r-to" style="font-family:monospace;font-weight:600;color:var(--text);font-size:0.9rem;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Số tiền</span>
                    <span id="r-amount" style="font-weight:700;font-size:1.2rem;color:#10b981;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Nội dung</span>
                    <span id="r-desc" style="color:var(--text);font-size:0.9rem;text-align:right;max-width:200px;"></span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;">
                    <span style="color:var(--text-muted);font-size:0.85rem;">Thời gian</span>
                    <span id="r-date" style="color:var(--text);font-size:0.9rem;"></span>
                </div>
            </div>

            <div style="display:flex;gap:12px;margin-top:24px;justify-content:center;flex-wrap:wrap;">
                <a href="/transfer" class="btn btn-primary">💸 Tiếp tục chuyển tiền</a>
                <a href="/dashboard" class="btn btn-outline">📊 Về tổng quan</a>
                <button onclick="window.print()" class="btn btn-outline">🖨️ In hóa đơn</button>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        var params = new URLSearchParams(window.location.search);
        document.getElementById('r-txCode').textContent = params.get('tx') || '—';
        document.getElementById('r-from').textContent = params.get('from') || '—';
        document.getElementById('r-to').textContent = params.get('to') || '—';
        document.getElementById('r-amount').textContent = params.get('amount') ? formatVND(parseFloat(params.get('amount'))) : '—';
        document.getElementById('r-desc').textContent = params.get('desc') || '—';
        document.getElementById('r-date').textContent = params.get('date') || new Date().toLocaleString('vi-VN');
    </script>
    <style>
        @keyframes pulse { 0% { transform:scale(0.5);opacity:0; } 100% { transform:scale(1);opacity:1; } }
        @media print { .navbar, .sidebar, .main-content > div > div:last-child { display:none; } .main-content { padding:0!important;margin:0!important; } }
    </style>
</body>
</html>
