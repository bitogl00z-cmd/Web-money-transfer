<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Định kỳ')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('scheduled')"></nav>
    <aside th:replace="fragments/layout :: sidebar('scheduled')"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">⏰ Thanh toán định kỳ</h1>
            <p class="page-subtitle">Quản lý các giao dịch tự động</p>
        </div>
        <div class="card">
            <div class="table-container">
                <table class="table"><thead><tr><th>Đến tài khoản</th><th>Số tiền</th><th>Tần suất</th><th>Lần chạy tiếp</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody id="paymentsBody"></tbody></table>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        fetch('/api/scheduled-payments', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
            var body = document.getElementById('paymentsBody');
            if (data.length) {
                data.forEach(function(p) { var row = body.insertRow(); row.innerHTML = '<td style="font-family:monospace;">' + p.toAccountNumber + '</td><td style="font-weight:600;">' + formatVND(p.amount) + '</td><td>' + p.frequency + '</td><td>' + p.nextRun + '</td><td><span class="badge ' + (p.status === 'ACTIVE' ? 'badge-success' : 'badge-gray') + '">' + p.status + '</span></td><td>' + (p.status === 'ACTIVE' ? '<button onclick="cancel(' + p.id + ')" class="btn btn-danger btn-sm">Hủy</button>' : '') + '</td>'; });
            } else { body.innerHTML = '<tr><td colspan="6" class="empty">Chưa có thanh toán định kỳ</td></tr>'; }
        });
        function cancel(id) { fetch('/api/scheduled-payments/' + id, { method: 'DELETE', credentials: 'include' }).then(function() { location.reload(); }); }
    </script>
</body>
</html>
