<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Scheduled - Money Transfer</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100">
<nav class="bg-blue-600 text-white p-4 shadow-lg"><div class="container mx-auto flex justify-between"><span class="text-xl font-bold">MoneyTransfer</span><div class="space-x-4">
<a href="/dashboard" class="hover:underline">Dashboard</a><a href="/transfer" class="hover:underline">Transfer</a><a href="/history" class="hover:underline">History</a><a href="/beneficiaries" class="hover:underline">Beneficiaries</a><a href="/scheduled" class="underline font-bold">Scheduled</a><a href="/profile" class="hover:underline">Profile</a><a href="/logout" class="hover:underline">Logout</a>
</div></div></nav>
<div class="container mx-auto p-4"><h1 class="text-2xl font-bold mb-4">Scheduled Payments</h1>
<div class="bg-white p-6 rounded-lg shadow"><table class="w-full"><thead><tr class="border-b"><th class="text-left p-2">To Account</th><th class="text-left p-2">Amount</th><th class="text-left p-2">Frequency</th><th class="text-left p-2">Next Run</th><th class="text-left p-2">Status</th><th class="text-left p-2">Actions</th></tr></thead><tbody id="paymentsBody"></tbody></table></div>
</div>
<script>
fetch('/api/scheduled-payments',{credentials:'include'}).then(r=>r.json()).then(data=>{const body=document.getElementById('paymentsBody');data.forEach(p=>{const row=body.insertRow();row.innerHTML='<td class="p-2">'+p.toAccountNumber+'</td><td class="p-2">$'+p.amount+'</td><td class="p-2">'+p.frequency+'</td><td class="p-2">'+p.nextRun+'</td><td class="p-2">'+p.status+'</td><td class="p-2">'+(p.status==='ACTIVE'?'<button onclick="cancel('+p.id+')" class="text-red-600 hover:underline">Cancel</button>':'')+'</td>';});});
function cancel(id){fetch('/api/scheduled-payments/'+id,{method:'DELETE',credentials:'include'}).then(()=>location.reload());}
</script>
</body>
</html>
