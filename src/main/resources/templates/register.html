<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🚀</div>
            <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 text-sm">Join Money Transfer today</p>
        </div>
        <div id="errorMsg" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 hidden"></div>
        <div id="successMsg" class="bg-green-50 text-green-600 p-3 rounded-lg text-sm mb-4 hidden"></div>
        <form id="registerForm">
            <div class="mb-3">
                <label class="block text-gray-700 text-sm font-medium mb-1">Full Name</label>
                <input type="text" id="fullName" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <div class="mb-3">
                <label class="block text-gray-700 text-sm font-medium mb-1">Username</label>
                <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <div class="mb-3">
                <label class="block text-gray-700 text-sm font-medium mb-1">Email</label>
                <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <button type="submit" id="registerBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-medium hover:bg-blue-700 transition">Create Account</button>
        </form>
        <p class="mt-6 text-center text-gray-500 text-sm">
            Already have an account? <a href="/login" class="text-blue-600 hover:underline font-medium">Sign in</a>
        </p>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const err = document.getElementById('errorMsg');
            const success = document.getElementById('successMsg');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            err.classList.add('hidden');
            success.classList.add('hidden');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        fullName: document.getElementById('fullName').value,
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    }),
                    credentials: 'same-origin'
                });
                const data = await res.json();
                if (res.ok) {
                    success.textContent = 'Registration successful! Redirecting...';
                    success.classList.remove('hidden');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    err.textContent = data.error || 'Registration failed';
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.textContent = 'Network error. Please try again.';
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
