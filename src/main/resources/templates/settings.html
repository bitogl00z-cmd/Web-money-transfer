<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Cài đặt')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('settings')"></nav>
    <aside th:replace="fragments/layout :: sidebar('settings')"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Cài đặt</h1>
            <p class="page-subtitle">Quản lý tài khoản và bảo mật</p>
        </div>

        <div class="tabs" style="display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap;">
            <button class="tab-btn active" data-tab="personal">👤 Cá nhân</button>
            <button class="tab-btn" data-tab="security">🔒 Bảo mật</button>
            <button class="tab-btn" data-tab="pin">🔐 Mã PIN</button>
            <button class="tab-btn" data-tab="face">📸 Gương mặt</button>
            <button class="tab-btn" data-tab="notifications">🔔 Thông báo</button>
            <button class="tab-btn" data-tab="language">🌐 Ngôn ngữ</button>
        </div>

        <div id="tab-personal" class="tab-content active">
            <div class="card profile-card">
                <div class="card-header"><div class="card-title">Thông tin cá nhân</div></div>
                <div class="card-body">
                    <div class="profile-card-header">
                        <div class="profile-avatar-wrapper">
                            <div class="profile-avatar" id="avatarPreview">
                                <div class="avatar-placeholder" id="avatarPlaceholder">U</div>
                                <img id="avatarImg" src="" alt="Avatar" style="display:none;">
                            </div>
                            <button type="button" class="avatar-upload-btn" onclick="document.getElementById('avatarInput').click()">
                                Tải ảnh từ máy
                            </button>
                            <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                        </div>
                        <div class="profile-info">
                            <div class="profile-name" id="profileDisplayName">User Name</div>
                            <div class="profile-username" id="profileDisplayUsername">@username</div>
                            <div class="profile-tier"><span class="badge badge-info" id="p-tier">STANDARD</span></div>
                        </div>
                    </div>
                    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;">
                    <div class="form-group"><label class="form-label">Họ và tên</label><input type="text" id="p-fullName" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Email</label><input type="email" id="p-email" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Số điện thoại</label><input type="tel" id="p-phone" class="form-input"></div>
                    <button onclick="savePersonalInfo()" class="btn btn-primary">Lưu thay đổi</button>
                </div>
            </div>
        </div>

        <div id="tab-security" class="tab-content">
            <div class="card" style="margin-bottom:16px;">
                <div class="card-header"><div class="card-title">🔑 Đổi mật khẩu</div></div>
                <div class="card-body">
                    <div class="form-group"><label class="form-label">Mật khẩu cũ</label><input type="password" id="s-oldPassword" class="form-input" placeholder="••••••••"></div>
                    <div class="form-group"><label class="form-label">Mật khẩu mới</label><input type="password" id="s-newPassword" class="form-input" placeholder="••••••••"></div>
                    <div class="form-group"><label class="form-label">Xác nhận mật khẩu mới</label><input type="password" id="s-confirmPassword" class="form-input" placeholder="••••••••"></div>
                    <button onclick="changePassword()" class="btn btn-primary">Đổi mật khẩu</button>
                </div>
            </div>
        </div>

        <div id="tab-pin" class="tab-content">
            <div class="card">
                <div class="card-header"><div class="card-title">🔐 Mã PIN giao dịch</div></div>
                <div class="card-body">
                    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:16px;">Mã PIN bắt buộc để xác thực khi chuyển tiền.</p>
                    <div id="pinStatus" style="margin-bottom:12px;"></div>
                    <div id="pinFormArea">
                        <div class="form-group"><label class="form-label">Mã PIN hiện tại</label><input type="password" id="oldPinInput" class="form-input" placeholder="••••••" maxlength="6" inputmode="numeric" style="max-width:200px;"></div>
                        <div class="form-group"><label class="form-label">Mã PIN mới (4-6 số)</label><input type="password" id="pinInput" class="form-input" placeholder="••••••" maxlength="6" inputmode="numeric" style="max-width:200px;"></div>
                        <div class="form-group"><label class="form-label">Xác nhận mã PIN</label><input type="password" id="pinConfirm" class="form-input" placeholder="••••••" maxlength="6" inputmode="numeric" style="max-width:200px;"></div>
                        <button onclick="savePin()" class="btn btn-primary" id="pinSaveBtn">Cài đặt PIN</button>
                    </div>
                </div>
            </div>
        </div>


        <div id="tab-face" class="tab-content">
            <div class="card">
                <div class="card-header"><div class="card-title">📸 Xác thực gương mặt</div></div>
                <div class="card-body">
                    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:16px;">Đăng ký gương mặt để đăng nhập nhanh và xác thực giao dịch trên 10 triệu.</p>
                    <div id="faceStatus" style="margin-bottom:12px;"></div>
                    <div id="faceActions" style="display:flex;gap:12px;flex-wrap:wrap;">
                        <button onclick="registerFace()" id="registerFaceBtn" class="btn btn-primary">📸 Đăng ký gương mặt</button>
                        <button onclick="removeFace()" id="removeFaceBtn" class="btn btn-outline" style="display:none;">🗑 Xóa gương mặt</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-notifications" class="tab-content">
            <div class="card">
                <div class="card-header"><div class="card-title">🔔 Thông báo</div></div>
                <div class="card-body">
                    <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
                        <input type="checkbox" id="n-emailNotifications" onchange="saveNotifications()"> Nhận thông báo giao dịch qua email
                    </label>
                </div>
            </div>
        </div>

        <div id="tab-language" class="tab-content">
            <div class="card">
                <div class="card-header"><div class="card-title">🌐 Ngôn ngữ</div></div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">Ngôn ngữ hiển thị</label>
                        <select id="l-language" class="form-input" onchange="saveLanguage()">
                            <option value="vi">Tiếng Việt</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <style>
        .tab-btn { padding:10px 20px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:0.9rem;font-weight:500;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
        .tab-btn:hover { color:var(--text);background:var(--bg);}
        .tab-btn.active { color:var(--primary);border-bottom-color:var(--primary);background:transparent;}
        .tab-content { display:none;}
        .tab-content.active { display:block;}
    </style>
    <script>
        var userData = null;

        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        fetch('/api/users/profile', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(u) {
            userData = u;
            document.getElementById('p-fullName').value = u.fullName || '';
            document.getElementById('p-email').value = u.email || '';
            document.getElementById('p-phone').value = u.phone || '';
            document.getElementById('p-tier').textContent = u.tier || 'STANDARD';
            // Avatar display
            var avatarUrl = u.avatarUrl;
            var avatarImg = document.getElementById('avatarImg');
            var avatarPlaceholder = document.getElementById('avatarPlaceholder');
            if (avatarUrl && avatarUrl.trim() !== '') {
                avatarImg.src = avatarUrl;
                avatarImg.style.display = '';
                avatarPlaceholder.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarPlaceholder.style.display = '';
                var name = u.fullName || u.username || 'U';
                avatarPlaceholder.textContent = name.charAt(0).toUpperCase();
            }
            document.getElementById('profileDisplayName').textContent = u.fullName || u.username || '';
            document.getElementById('profileDisplayUsername').textContent = '@' + (u.username || '');
            document.getElementById('n-emailNotifications').checked = u.emailNotifications !== false;
            document.getElementById('l-language').value = u.language || 'vi';
            // Face status
            var faceStatus = document.getElementById('faceStatus');
            var faceActions = document.getElementById('faceActions');
            if (u.faceEnabled) {
                faceStatus.innerHTML = '<span class="badge badge-success">✓ Đã đăng ký gương mặt</span>';
                document.getElementById('registerFaceBtn').textContent = '📸 Chụp lại gương mặt';
                document.getElementById('removeFaceBtn').style.display = '';
            } else {
                faceStatus.innerHTML = '<span class="badge badge-info">ℹ Chưa đăng ký gương mặt</span>';
                document.getElementById('removeFaceBtn').style.display = 'none';
                document.getElementById('registerFaceBtn').textContent = '📸 Đăng ký gương mặt';
            }
            // PIN status
            if (u.pinSet) {
                document.getElementById('pinStatus').innerHTML = '<span class="badge badge-success">✓ Đã cài mã PIN</span>';
                document.getElementById('pinSaveBtn').textContent = 'Đổi mã PIN';
            } else {
                document.getElementById('pinStatus').innerHTML = '<span class="badge badge-warning">⚠️ Bắt buộc: chưa cài mã PIN</span>';
                document.getElementById('pinSaveBtn').textContent = 'Cài đặt PIN';
            }
        });

        function savePersonalInfo() {
            var body = { fullName: document.getElementById('p-fullName').value, email: document.getElementById('p-email').value, phone: document.getElementById('p-phone').value };
            apiFetch('/api/users/profile', { method: 'PUT', body: body }).then(function(res) {
                if (res.ok) { showToast('Cập nhật thông tin thành công', 'success'); } else { showToast(res.data.error || 'Lỗi', 'error'); }
            });
        }

        function changePassword() {
            var oldPw = document.getElementById('s-oldPassword').value;
            var newPw = document.getElementById('s-newPassword').value;
            var confirmPw = document.getElementById('s-confirmPassword').value;
            if (!oldPw || !newPw || !confirmPw) { showToast('Vui lòng điền đầy đủ thông tin', 'error'); return; }
            if (newPw !== confirmPw) { showToast('Mật khẩu mới không khớp', 'error'); return; }
            if (newPw.length < 6) { showToast('Mật khẩu phải có ít nhất 6 ký tự', 'error'); return; }
            apiFetch('/api/auth/change-password', { method: 'POST', body: { oldPassword: oldPw, newPassword: newPw } }).then(function(res) {
                if (res.ok) { showToast('Đổi mật khẩu thành công', 'success'); document.getElementById('s-oldPassword').value = ''; document.getElementById('s-newPassword').value = ''; document.getElementById('s-confirmPassword').value = ''; }
                else { showToast(res.data.error || 'Lỗi', 'error'); }
            });
        }

        function savePin() {
            var pin = document.getElementById('pinInput').value;
            var confirm = document.getElementById('pinConfirm').value;
            var oldPin = document.getElementById('oldPinInput').value;
            if (!pin || !pin.match(/^\d{4,6}$/)) { showToast('Mã PIN phải là 4-6 chữ số', 'error'); return; }
            if (pin !== confirm) { showToast('Mã PIN không khớp', 'error'); return; }
            apiFetch('/api/pin/set', { method: 'POST', body: { pin: pin, oldPin: oldPin } }).then(function(res) {
                if (res.ok) {
                    showToast('Cài đặt mã PIN thành công', 'success');
                    document.getElementById('pinStatus').innerHTML = '<span class="badge badge-success">✓ Đã cài mã PIN</span>';
                    document.getElementById('pinSaveBtn').textContent = 'Đổi mã PIN';
                    document.getElementById('pinInput').value = '';
                    document.getElementById('pinConfirm').value = '';
                    document.getElementById('oldPinInput').value = '';
                } else { showToast(res.data.error || 'Lỗi', 'error'); }
            });
        }

        function registerFace() {
            openCamera(function(base64) {
                if (!base64) return;
                var btn = document.getElementById('registerFaceBtn');
                btn.disabled = true; btn.textContent = 'Đang xử lý...';
                apiFetch('/api/face/register', { method: 'POST', body: { faceImage: base64 } }).then(function(res) {
                    if (res.ok) {
                        showToast('Đăng ký gương mặt thành công', 'success');
                        document.getElementById('faceStatus').innerHTML = '<span class="badge badge-success">✓ Đã đăng ký gương mặt</span>';
                        document.getElementById('registerFaceBtn').textContent = '📸 Chụp lại gương mặt';
                        document.getElementById('removeFaceBtn').style.display = '';
                    } else {
                        showToast(res.data.error || 'Đăng ký thất bại', 'error');
                    }
                    btn.disabled = false;
                });
            });
        }

        function removeFace() {
            if (!confirm('Bạn có chắc muốn xóa dữ liệu gương mặt?')) return;
            apiFetch('/api/users/profile', { method: 'PUT', body: { faceEnabled: 'false' } }).then(function(res) {
                if (res.ok) {
                    showToast('Đã xóa gương mặt', 'success');
                    document.getElementById('faceStatus').innerHTML = '<span class="badge badge-info">ℹ Chưa đăng ký gương mặt</span>';
                    document.getElementById('registerFaceBtn').textContent = '📸 Đăng ký gương mặt';
                    document.getElementById('removeFaceBtn').style.display = 'none';
                } else {
                    showToast(res.data.error || 'Thất bại', 'error');
                }
            });
        }

        function saveNotifications() {
            apiFetch('/api/users/profile', { method: 'PUT', body: { emailNotifications: document.getElementById('n-emailNotifications').checked.toString() } }).then(function(res) {
                if (res.ok) { showToast('Đã lưu', 'success'); } else { showToast('Lỗi', 'error'); }
            });
        }

        function saveLanguage() {
            var lang = document.getElementById('l-language').value;
            apiFetch('/api/users/profile', { method: 'PUT', body: { language: lang } }).then(function(res) {
                if (res.ok) { showToast('Đã lưu ngôn ngữ', 'success'); applyLanguage(lang); } else { showToast('Lỗi', 'error'); }
            });
        }

        function uploadAvatar(file) {
            var formData = new FormData();
            formData.append('avatar', file);
            apiFetch('/api/users/avatar', { method: 'POST', body: formData }).then(function(res) {
                if (res.ok) {
                    showToast('Cập nhật ảnh đại diện thành công', 'success');
                    var img = document.getElementById('avatarImg');
                    img.src = res.data.avatarUrl + '?t=' + Date.now();
                    img.style.display = '';
                    document.getElementById('avatarPlaceholder').style.display = 'none';
                } else {
                    showToast(res.data.error || 'Tải ảnh thất bại', 'error');
                }
            });
        }

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            var file = e.target.files && e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Ảnh phải nhỏ hơn 5MB', 'error');
                    this.value = '';
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    showToast('Chỉ chấp nhận file ảnh', 'error');
                    this.value = '';
                    return;
                }
                uploadAvatar(file);
            }
        });
    </script>
</body>
</html>
