<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Beneficiaries - Money Transfer</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100">
<nav class="bg-blue-600 text-white p-4 shadow-lg"><div class="container mx-auto flex justify-between"><span class="text-xl font-bold">MoneyTransfer</span><div class="space-x-4">
<a href="/dashboard" class="hover:underline">Dashboard</a><a href="/transfer" class="hover:underline">Transfer</a><a href="/beneficiaries" class="underline font-bold">Beneficiaries</a><a href="/scheduled" class="hover:underline">Scheduled</a><a href="/profile" class="hover:underline">Profile</a><a href="/logout" class="hover:underline">Logout</a>
</div></div></nav>
<div class="container mx-auto p-4"><h1 class="text-2xl font-bold mb-4">Beneficiaries</h1>
<div class="bg-white p-6 rounded-lg shadow mb-4">
<h2 class="text-lg font-bold mb-2">Add Beneficiary</h2>
<form id="addForm" class="flex gap-2">
<input type="text" id="accountNumber" placeholder="Account Number" class="flex-1 p-2 border rounded" required>
<input type="text" id="nickname" placeholder="Nickname" class="flex-1 p-2 border rounded">
<button type="submit" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Add</button>
</form>
</div>
<div class="bg-white p-6 rounded-lg shadow"><table class="w-full"><thead><tr class="border-b"><th class="text-left p-2">Account</th><th class="text-left p-2">Nickname</th><th class="text-left p-2">Actions</th></tr></thead><tbody id="beneficiariesBody"></tbody></table></div>
</div>
<script>
function loadBeneficiaries(){fetch('/api/users/beneficiaries',{credentials:'include'}).then(r=>r.json()).then(data=>{const body=document.getElementById('beneficiariesBody');body.innerHTML='';data.forEach(b=>{const row=body.insertRow();row.innerHTML='<td class="p-2">'+b.accountNumber+'</td><td class="p-2">'+(b.nickname||'')+'</td><td class="p-2"><button onclick="deleteBeneficiary('+b.id+')" class="text-red-600 hover:underline">Delete</button></td>';});});}
function deleteBeneficiary(id){fetch('/api/users/beneficiaries/'+id,{method:'DELETE',credentials:'include'}).then(()=>loadBeneficiaries());}
document.getElementById('addForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/users/beneficiaries',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({accountNumber:document.getElementById('accountNumber').value,nickname:document.getElementById('nickname').value})}).then(()=>{document.getElementById('accountNumber').value='';document.getElementById('nickname').value='';loadBeneficiaries();});});
loadBeneficiaries();
</script>
</body>
</html>
