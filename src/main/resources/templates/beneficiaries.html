<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Thụ hưởng')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('beneficiaries')"></nav>
    <aside th:replace="fragments/layout :: sidebar('beneficiaries')"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">👥 Người thụ hưởng</h1>
            <p class="page-subtitle">Quản lý danh sách người nhận thường xuyên</p>
        </div>
        <div class="card" style="margin-bottom:24px;">
            <div class="card-header"><div class="card-title">Thêm người thụ hưởng</div></div>
            <form id="addForm" style="display:flex;gap:12px;flex-wrap:wrap;">
                <input type="text" id="accountNumber" class="form-input" placeholder="Số tài khoản" required style="flex:2;min-width:200px;">
                <input type="text" id="nickname" class="form-input" placeholder="Tên gợi nhớ" style="flex:1;min-width:140px;">
                <button type="submit" class="btn btn-primary">➕ Thêm</button>
            </form>
        </div>
        <div class="card">
            <div class="table-container">
                <table class="table"><thead><tr><th>Số tài khoản</th><th>Tên gợi nhớ</th><th>Thao tác</th></tr></thead><tbody id="beneficiariesBody"></tbody></table>
            </div>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        function loadBeneficiaries() {
            fetch('/api/users/beneficiaries', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
                var body = document.getElementById('beneficiariesBody'); body.innerHTML = '';
                if (data.length) { data.forEach(function(b) { var row = body.insertRow(); row.innerHTML = '<td style="font-family:monospace;">' + b.accountNumber + '</td><td>' + (b.nickname || '') + '</td><td><button onclick="deleteBeneficiary(' + b.id + ')" class="btn btn-danger btn-sm">Xóa</button></td>'; }); }
                else { body.innerHTML = '<tr><td colspan="3" class="empty">Chưa có người thụ hưởng</td></tr>'; }
            });
        }
        function deleteBeneficiary(id) { fetch('/api/users/beneficiaries/' + id, { method: 'DELETE', credentials: 'include' }).then(function() { loadBeneficiaries(); showToast('Đã xóa', 'success'); }); }
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch('/api/users/beneficiaries', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ accountNumber: document.getElementById('accountNumber').value, nickname: document.getElementById('nickname').value }) }).then(function() {
                document.getElementById('accountNumber').value = ''; document.getElementById('nickname').value = ''; loadBeneficiaries(); showToast('Đã thêm người thụ hưởng', 'success');
            });
        });
        loadBeneficiaries();
    </script>
</body>
</html>
