<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Chuyển tiền')"></head>
<body>
    <nav th:replace="fragments/layout :: navbar('transfer')"></nav>
    <aside th:replace="fragments/layout :: sidebar('transfer')"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Chuyển tiền</h1>
            <p class="page-subtitle">Chuyển tiền đến tài khoản khác nhanh chóng và an toàn</p>
        </div>
        <div class="card" style="max-width:520px;">
            <div id="message" style="display:none;padding:12px 16px;border-radius:var(--radius-sm);font-size:0.9rem;margin-bottom:16px;"></div>
            <form id="transferForm">
                <div class="card" style="background:var(--bg);padding:16px;border-radius:var(--radius-sm);margin-bottom:20px;">
                    <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:4px;">Tài khoản nguồn</div>
                    <div id="accountInfo">
                        <span style="font-size:0.85rem;color:var(--text-muted);">Đang tải...</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Đến tài khoản</label>
                    <input type="text" id="toAccount" class="form-input" placeholder="Nhập số tài khoản đích" required>
                    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
                        <button type="button" id="scanQrBtn" class="btn btn-outline btn-sm">📷 Quét mã QR</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Số tiền</label>
                    <input type="number" id="amount" step="1000" min="1000" class="form-input" placeholder="Nhập số tiền (VNĐ)" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nội dung</label>
                    <input type="text" id="description" class="form-input" placeholder="Nội dung chuyển khoản">
                </div>
                <button type="submit" id="transferBtn" class="btn btn-primary btn-lg btn-full">💸 Chuyển tiền</button>
            </form>
            <div class="card" style="margin-top:20px;">
                <div class="card-header"><div class="card-title">🕐 Tài khoản gần đây</div></div>
                <div id="recentList" style="display:flex;flex-wrap:wrap;gap:8px;">Đang tải...</div>
            </div>
            <p style="margin-top:8px;text-align:center;"><a href="/dashboard" class="btn btn-outline btn-sm">← Về tổng quan</a></p>
        </div>
    </main>
    <div th:replace="fragments/layout :: toast"></div>
    <div th:replace="fragments/layout :: scripts"></div>
    <script>
        var currentAccount = null;
        var userPinSet = false;
        var userPinLoaded = false;
        var currentPinToken = null;

        // Fill ?to= from QR scan page
        var params = new URLSearchParams(window.location.search);
        var toAcct = params.get('to');
        if (toAcct) document.getElementById('toAccount').value = toAcct;

        async function requirePin() {
            var pin = prompt('Nhập mã PIN giao dịch:');
            if (!pin) return null;
            var pinRes = await apiFetch('/api/pin/verify', { method: 'POST', body: { pin: pin } });
            if (pinRes.ok && pinRes.data.pinToken) return pinRes.data.pinToken;
            showToast('Sai mã PIN', 'error');
            return null;
        }

        function showReceipt(d) {
            openModal(
                '<div style="text-align:center;">' +
                    '<div style="font-size:2.5rem;margin-bottom:8px;">✅</div>' +
                    '<div class="modal-title" style="color:#10b981;">Giao dịch thành công</div>' +
                '</div>' +
                '<div style="background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin:16px 0;">' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Mã giao dịch</span>' +
                        '<span style="font-family:monospace;font-weight:600;color:var(--text);">' + d.transactionCode + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Từ tài khoản</span>' +
                        '<span style="font-family:monospace;font-weight:600;color:var(--text);">' + d.fromAccount + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Đến tài khoản</span>' +
                        '<span style="font-family:monospace;font-weight:600;color:var(--text);">' + d.toAccount + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Số tiền</span>' +
                        '<span style="font-weight:700;font-size:1.1rem;color:#10b981;">' + formatVND(d.amount) + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Nội dung</span>' +
                        '<span style="color:var(--text);text-align:right;max-width:220px;">' + d.description + '</span>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;">' +
                        '<span style="color:var(--text-muted);">Thời gian</span>' +
                        '<span style="color:var(--text);">' + d.date + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="modal-actions" style="justify-content:center;">' +
                    '<button onclick="closeModal()" class="btn btn-primary">Đóng</button>' +
                '</div>'
            );
        }

        apiFetch('/api/users/profile').then(function(res) {
            if (res.ok) { userPinSet = res.data.pinSet; }
            userPinLoaded = true;
        });

        apiFetch('/api/accounts').then(function(res) {
            if (res.ok && res.data.length > 0) {
                currentAccount = res.data[0];
                var info = document.getElementById('accountInfo');
                info.innerHTML = '<span style="font-size:0.85rem;color:var(--text-muted);">' + currentAccount.accountNumber + '</span>'
                    + '<div style="font-size:1.5rem;font-weight:700;color:var(--text);margin-top:2px;">' + formatVND(currentAccount.balance) + '</div>';
            }
        });

        apiFetch('/api/recent-transfers').then(function(res) {
            if (res.ok && res.data.length) {
                var list = document.getElementById('recentList');
                if (!list) return;
                list.innerHTML = '';
                res.data.forEach(function(rt) {
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn btn-outline btn-sm';
                    btn.style.margin = '0';
                    btn.textContent = '🏦 ' + rt.toAccountNumber + (rt.toAccountName ? ' (' + rt.toAccountName + ')' : '');
                    btn.onclick = function() { document.getElementById('toAccount').value = rt.toAccountNumber; };
                    list.appendChild(btn);
                });
            } else {
                var list = document.getElementById('recentList');
                if (list) list.textContent = 'Chưa có giao dịch nào';
            }
        });

        document.getElementById('transferForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('transferBtn');
            var msg = document.getElementById('message');
            btn.disabled = true; btn.textContent = 'Đang xử lý...';
            msg.style.display = 'none';

            var amount = parseFloat(document.getElementById('amount').value);
            var body = {
                fromAccountId: currentAccount ? currentAccount.id : 0,
                toAccountNumber: document.getElementById('toAccount').value,
                amount: amount,
                description: document.getElementById('description').value
            };
            var headers = {};

            // Always require PIN if user has one
            if (!userPinLoaded) {
                var profileRes = await apiFetch('/api/users/profile');
                if (profileRes.ok) { userPinSet = profileRes.data.pinSet; }
                userPinLoaded = true;
            }
            if (userPinSet) {
                currentPinToken = await requirePin();
                if (!currentPinToken) { btn.disabled = false; btn.textContent = '💸 Chuyển tiền'; return; }
                headers['x-pin-token'] = currentPinToken;
            }

            // Face verification for amounts >= 10,000,000
            var faceToken = null;
            if (amount >= 10000000) {
                var faceResult = await new Promise(function(resolve) {
                    openCamera(function(base64) { resolve(base64); });
                });
                if (!faceResult) { btn.disabled = false; btn.textContent = '💸 Chuyển tiền'; return; }
                var faceRes = await apiFetch('/api/face/verify-for-transfer', { method: 'POST', body: { faceImage: faceResult } });
                if (faceRes.ok && faceRes.data.faceToken) {
                    faceToken = faceRes.data.faceToken;
                    body.faceToken = faceToken;
                } else {
                    showToast('Xác thực gương mặt thất bại', 'error');
                    btn.disabled = false; btn.textContent = '💸 Chuyển tiền'; return;
                }
            }

            var res = await apiFetch('/api/transactions/transfer', { method: 'POST', body: body, headers: headers });

            if (res.ok) {
                var txCode = encodeURIComponent(res.data.transactionCode);
                var fromAcct = encodeURIComponent(currentAccount ? currentAccount.accountNumber : '');
                var toAcct = encodeURIComponent(document.getElementById('toAccount').value);
                var amt = encodeURIComponent(amount);
                var desc = encodeURIComponent(document.getElementById('description').value || 'Chuyển tiền');
                var date = encodeURIComponent(new Date().toLocaleString('vi-VN'));
                window.location.href = '/receipt?tx=' + txCode + '&from=' + fromAcct + '&to=' + toAcct + '&amount=' + amt + '&desc=' + desc + '&date=' + date;
                document.getElementById('transferForm').reset();
                if (currentAccount) {
                    currentAccount.balance -= amount;
                    var info = document.getElementById('accountInfo');
                    info.innerHTML = '<span style="font-size:0.85rem;color:var(--text-muted);">' + currentAccount.accountNumber + '</span>'
                        + '<div style="font-size:1.5rem;font-weight:700;color:var(--text);margin-top:2px;">' + formatVND(currentAccount.balance) + '</div>';
                }
            } else {
                msg.style.display = 'block';
                msg.style.background = '#fce4ec'; msg.style.color = 'var(--danger)';
                msg.textContent = '❌ ' + (res.data.error || 'Giao dịch thất bại');
            }
            btn.disabled = false; btn.textContent = '💸 Chuyển tiền';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
    document.getElementById('scanQrBtn').addEventListener('click', function() {
        openCamera(function(base64) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code && code.data.startsWith('acct:')) {
                    var acctNumber = code.data.substring(5);
                    document.getElementById('toAccount').value = acctNumber;
                    showToast('Đã quét mã: ' + escapeHtml(acctNumber), 'success');
                } else {
                    showToast('Không tìm thấy mã QR hợp lệ', 'error');
                }
            };
            img.src = 'data:image/jpeg;base64,' + base64;
        });
    });
    </script>
</body>
</html>
