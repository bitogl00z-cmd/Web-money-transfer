<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transfer - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between">
            <span class="text-xl font-bold">MoneyTransfer</span>
            <div class="space-x-4">
                <a href="/dashboard" class="hover:underline">Dashboard</a>
                <a href="/transfer" class="underline font-bold">Transfer</a>
                <a href="/history" class="hover:underline">History</a>
                <a href="/beneficiaries" class="hover:underline">Beneficiaries</a>
                <a href="/scheduled" class="hover:underline">Scheduled</a>
                <a href="/profile" class="hover:underline">Profile</a>
                <a href="/logout" class="hover:underline">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-4">
        <div class="bg-white p-6 rounded-lg shadow max-w-md mx-auto">
            <h1 class="text-2xl font-bold mb-4">Transfer Money</h1>
            <div id="message" class="hidden p-3 rounded mb-4"></div>
            <form id="transferForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">From Account</label>
                    <select id="fromAccount" class="w-full p-2 border rounded" required></select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">To Account Number</label>
                    <input type="text" id="toAccount" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Amount</label>
                    <input type="number" id="amount" step="0.01" min="0.01" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Description</label>
                    <input type="text" id="description" class="w-full p-2 border rounded">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Transfer</button>
            </form>
            <p class="mt-4 text-center"><a href="/dashboard" class="text-blue-600 hover:underline">Back to Dashboard</a></p>
        </div>
    </div>
    <script>
        fetch('/api/accounts', { credentials: 'include' })
            .then(r => r.json())
            .then(accounts => {
                const sel = document.getElementById('fromAccount');
                accounts.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.id;
                    opt.textContent = a.accountNumber + ' ($' + a.balance + ')';
                    sel.appendChild(opt);
                });
            });
        document.getElementById('transferForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                fromAccountId: parseInt(document.getElementById('fromAccount').value),
                toAccountNumber: document.getElementById('toAccount').value,
                amount: parseFloat(document.getElementById('amount').value),
                description: document.getElementById('description').value
            };
            fetch('/api/transactions/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                const msg = document.getElementById('message');
                if (res.transactionCode) {
                    msg.className = 'bg-green-100 text-green-700 p-3 rounded mb-4';
                    msg.textContent = 'Transfer successful! Code: ' + res.transactionCode;
                } else {
                    msg.className = 'bg-red-100 text-red-700 p-3 rounded mb-4';
                    msg.textContent = 'Error: ' + (res.error || 'Unknown error');
                }
                msg.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
